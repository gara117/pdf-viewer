<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white; padding: 20px 30px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    .badge {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
    }
    .controls {
      padding: 20px 30px; display: flex; gap: 12px; align-items: center;
      background: white; border-bottom: 1px solid #e0e0e0;
    }
    .controls input {
      flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 0.95rem; outline: none;
    }
    .controls input:focus { border-color: #1a73e8; }
    .controls select {
      padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 0.95rem; background: white; cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px; padding: 24px 30px;
    }
    .card {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    .thumbnail-wrap {
      position: relative; width: 100%; padding-top: 56.25%; background: #eceff1;
    }
    .thumbnail-wrap canvas, .thumbnail-wrap .no-thumb {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }
    .no-thumb {
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: #bdbdbd;
    }
    canvas { object-fit: contain; }
    .card-info { padding: 14px; }
    .card-title {
      font-weight: 600; font-size: 0.9rem; margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .card-meta { font-size: 0.78rem; color: #757575; }
    .msg { grid-column: 1/-1; text-align: center; color: #9e9e9e; padding: 60px; font-size: 1rem; }
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 1000;
      flex-direction: column; align-items: center; justify-content: center;
    }
    #overlay.active { display: flex; }
    #overlay-close {
      position: absolute; top: 20px; right: 28px;
      color: white; font-size: 2rem; cursor: pointer;
      background: none; border: none; line-height: 1;
    }
    #overlay iframe { width: 90vw; height: 85vh; border: none; border-radius: 8px; background: white; }
    #overlay-title {
      color: white; margin-bottom: 12px; font-size: 1rem;
      max-width: 90vw; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    }
  </style>
</head>
<body>
<header>
  <h1>PDF Viewer</h1>
  <span class="badge">Firebase Storage</span>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="Search PDF...">
  <select id="sort">
    <option value="name-asc">Name A-Z</option>
    <option value="name-desc">Name Z-A</option>
    <option value="time-desc">Newest</option>
    <option value="time-asc">Oldest</option>
  </select>
</div>
<div class="grid" id="grid"><div class="msg">Loading...</div></div>
<div id="overlay">
  <button id="overlay-close" onclick="closeOverlay()">X</button>
  <div id="overlay-title"></div>
  <iframe id="overlay-iframe" src=""></iframe>
</div>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getStorage, ref, listAll, getDownloadURL, getMetadata } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';
  const cfg = {
    apiKey: "AIzaSyD645UfQ61JafXEtiEghfqMqti6BxXrNas",
    authDomain: "mitsukiai-x.firebaseapp.com",
    projectId: "mitsukiai-x",
    storageBucket: "mitsukiai-x.firebasestorage.app",
    messagingSenderId: "172020679566",
    appId: "1:172020679566:web:1281082f88fce858fd1adf"
  };
  const app = initializeApp(cfg);
  const storage = getStorage(app);
  const pdfsRef = ref(storage);
  let allFiles = [];
  async function load() {
    const grid = document.getElementById('grid');
    try {
      const res = await listAll(pdfsRef);
      if (!res.items.length) {
        grid.innerHTML = '<div class="msg">No PDFs yet.<br>Upload PDF files to Firebase Storage pdfs/ folder.</div>';
        return;
      }
      allFiles = await Promise.all(res.items.map(async i => {
        const [url, meta] = await Promise.all([getDownloadURL(i), getMetadata(i)]);
        return { name: i.name, url, updated: meta.updated, size: meta.size };
      }));
      render(allFiles);
    } catch(e) {
      grid.innerHTML = '<div class="msg">Error: ' + e.message + '</div>';
    }
  }
  function fmt(b) {
    return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
  }
  function render(files) {
    const grid = document.getElementById('grid');
    const q = document.getElementById('search').value.toLowerCase();
    const s = document.getElementById('sort').value;
    let f = files.filter(x => x.name.toLowerCase().includes(q));
    if (s==='name-asc') f.sort((a,b)=>a.name.localeCompare(b.name));
    else if (s==='name-desc') f.sort((a,b)=>b.name.localeCompare(a.name));
    else if (s==='time-desc') f.sort((a,b)=>new Date(b.updated)-new Date(a.updated));
    else f.sort((a,b)=>new Date(a.updated)-new Date(b.updated));
    if (!f.length) { grid.innerHTML = '<div class="msg">No results.</div>'; return; }
    grid.innerHTML = '';
    f.forEach(file => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openPDF(file.url, file.name);
      const wrap = document.createElement('div');
      wrap.className = 'thumbnail-wrap';
      const ph = document.createElement('div');
      ph.className = 'no-thumb';
      ph.textContent = 'PDF';
      wrap.appendChild(ph);
      const info = document.createElement('div');
      info.className = 'card-info';
      const n = file.name.replace('.pdf','').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const d = new Date(file.updated).toLocaleDateString('ja-JP');
      info.innerHTML = '<div class="card-title">'+n+'</div><div class="card-meta">'+d+' - '+fmt(file.size)+'</div>';
      card.appendChild(wrap);
      card.appendChild(info);
      grid.appendChild(card);
      renderThumb(file.url, wrap, ph);
    });
  }
  async function renderThumb(url, wrap, ph) {
    try {
      const lib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.mjs');
      lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.mjs';
      const pdf = await lib.getDocument(url).promise;
      const page = await pdf.getPage(1);
      const vp = page.getViewport({scale: 1.2});
      const c = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
      ph.remove();
      wrap.appendChild(c);
    } catch(e) {}
  }
  function openPDF(url, name) {
    document.getElementById('overlay-title').textContent = name;
    document.getElementById('overlay-iframe').src = url;
    document.getElementById('overlay').classList.add('active');
  }
  window.closeOverlay = function() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('overlay-iframe').src = '';
  };
  document.getElementById('search').addEventListener('input', () => render(allFiles));
  document.getElementById('sort').addEventListener('change', () => render(allFiles));
  document.addEventListener('keydown', e => { if(e.key === 'Escape') window.closeOverlay(); });
  load();
</script>
</body>
</html>
